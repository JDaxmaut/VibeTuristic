<div style="background:#1a2a26;border:1px solid rgba(255,180,60,0.15);border-radius:10px;overflow:hidden;margin-bottom:20px;">
  <div style="padding:14px 24px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:10px;">
    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#e0a030;flex-shrink:0;"></span>
    <span style="color:#d8e0dc;font-size:13px;font-weight:500;">Черновики туров</span>
    <span style="margin-left:auto;background:rgba(224,160,48,0.12);color:#e0a030;font-size:11px;padding:2px 8px;border-radius:20px;">{{ drafts|length }}</span>
  </div>
  <div style="padding:8px 12px;">
    {% for tour in drafts %}
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;">
      <span style="color:#d8e0dc;font-size:13px;">{{ tour.title }}</span>
      <a href="/{{ admin_url }}pages/{{ tour.pk }}/edit/"
         style="color:#d4a853;font-size:12px;text-decoration:none;padding:4px 10px;border:1px solid rgba(212,168,83,0.25);border-radius:6px;">
        Редактировать
      </a>
    </div>
    {% endfor %}
  </div>
</div>
